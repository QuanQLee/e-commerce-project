worker_processes 1;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml text/plain;
  gzip_min_length 10240;

  map $sent_http_content_type $static_cache_control {
    default                     "public, max-age=600";
    ~*application/javascript    "public, max-age=31536000, immutable";
    ~*text/css                  "public, max-age=31536000, immutable";
    ~*image/                    "public, max-age=31536000, immutable";
    ~*font/                     "public, max-age=31536000, immutable";
  }

  server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: http:; frame-src 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cache-Control $static_cache_control always;

    location / {
      try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
      try_files $uri =404;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
  }
}
