openapi: 3.0.0
info:
  title: Shipping Rate API
  version: v1
paths:
  /rates:
    post:
      summary: Get shipping rate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                weight:
                  type: number
      responses:
        '200':
          description: OK
  /rates/aggregate:
    post:
      summary: Aggregate quotes from simulated providers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                weight:
                  type: number
                destination:
                  type: string
      responses:
        '200':
          description: Aggregated quotes
  /labels/purchase:
    post:
      summary: Simulate label purchase and trigger Shipping callback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [shipment_id, provider, weight]
              properties:
                shipment_id:
                  type: string
                provider:
                  type: string
                weight:
                  type: number
      responses:
        '200':
          description: Label purchase result
components: {}
