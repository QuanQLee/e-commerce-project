openapi: 3.1.0
info:
  title: Shipping API
  version: v1
paths:
  /shipments:
    get:
      summary: Get all shipments
      responses:
        '200': { description: List of shipments }
    post:
      summary: Create shipment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateShipmentDto' }
      responses:
        '201': { description: Created }

  /shipments/{id}:
    get:
      summary: Get shipment by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Shipment }
        '404': { description: Not found }

  /shipments/{id}/tracking:
    get:
      summary: Get shipment tracking timeline
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Tracking details }

  /shipments/{id}/tracking/callback:
    post:
      summary: Carrier tracking callback
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TrackingCallbackRequest' }
      responses:
        '204': { description: Accepted }

  /shipments/{id}/label:
    post:
      summary: Generate shipment label
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateLabelRequest' }
      responses:
        '200': { description: Label created }

  /shipments/{id}/exception:
    post:
      summary: Record shipment exception
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Exception recorded }

  /rates/calculate:
    post:
      summary: Calculate rate and SLA strategy
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RateRequest' }
      responses:
        '200':
          description: Rate response
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RateResponse' }

  /labels/callback:
    post:
      summary: Label provider callback
      responses:
        '204': { description: Accepted }

components:
  schemas:
    CreateShipmentDto:
      type: object
      properties:
        orderId: { type: string }
        weight: { type: number }
        destination: { type: string }
        isExpress: { type: boolean }

    RateRequest:
      type: object
      properties:
        weight: { type: number }
        destination: { type: string }
        isExpress: { type: boolean }

    RateResponse:
      type: object
      properties:
        fee: { type: number }
        estimatedDays: { type: integer }
        carrier: { type: string }
        serviceLevel: { type: string }
        currency: { type: string }

    GenerateLabelRequest:
      type: object
      properties:
        carrier: { type: string }

    TrackingCallbackRequest:
      type: object
      properties:
        status: { type: string }
        trackingNumber: { type: string }
        location: { type: string }
        description: { type: string }
        eventTime: { type: string, format: date-time }
