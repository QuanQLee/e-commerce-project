server:
  port: ${PORT:8080}
  shutdown: graceful

spring:
  application:
    name: catalog-java
  datasource:
    url: ${CATALOG_JDBC_URL:jdbc:postgresql://pg:5432/catalog}
    username: ${CATALOG_DB_USER:catalog_admin}
    password: ${CATALOG_DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: ${CATALOG_DB_MAX_POOL_SIZE:100}
      minimum-idle: ${CATALOG_DB_MIN_IDLE:10}
      connection-timeout: ${CATALOG_DB_CONNECTION_TIMEOUT_MS:2000}
      validation-timeout: ${CATALOG_DB_VALIDATION_TIMEOUT_MS:1000}
      idle-timeout: ${CATALOG_DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${CATALOG_DB_MAX_LIFETIME_MS:1800000}
  flyway:
    enabled: ${CATALOG_FLYWAY_ENABLED:true}
    schemas: catalog
    default-schema: catalog
    create-schemas: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit_naming_strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
        jdbc:
          time_zone: UTC
        query:
          in_clause_parameter_padding: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: catalog-java
