version: '3.9'
services:
  pg:
    image: postgres:16-alpine
    container_name: catalog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-catalog_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-catalog}
    ports:
    - 5432:5432
    volumes:
    - pgdata:/var/lib/postgresql/data
  catalog.api:
    image: ${REGISTRY}:catalog.api-${TAG:-dev}
    container_name: catalog-api
    depends_on:
    - pg
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CatalogDb: Host=pg;Port=5432;Database=${DB_NAME:-catalog};Username=${DB_USER:-catalog_admin};Password=${DB_PASSWORD}
    ports:
    - 5000:8080
  order.api:
    image: ${REGISTRY}:order.api-${TAG:-dev}
    container_name: order-api
    depends_on:
    - pg
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__OrderDb: Host=pg;Port=5432;Database=${DB_NAME:-catalog};Username=${DB_USER:-catalog_admin};Password=${DB_PASSWORD}
    ports:
    - 5002:8080
  user.api:
    image: ${REGISTRY}:user.api-${TAG:-dev}
    container_name: user-api
    depends_on:
    - pg
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__UserDb: Host=pg;Port=5432;Database=${DB_NAME:-catalog};Username=${DB_USER:-catalog_admin};Password=${DB_PASSWORD}
    ports:
    - 5003:80
  shipping.api:
    image: ${REGISTRY}:shipping.api-${TAG:-dev}
    container_name: shipping-api
    depends_on:
    - pg
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ShippingDb: Host=pg;Port=5432;Database=${DB_NAME:-catalog};Username=${DB_USER:-catalog_admin};Password=${DB_PASSWORD}
    ports:
    - 5004:80
  payment.api:
    image: ${REGISTRY}:payment.api-${TAG:-dev}
    container_name: payment-api
    depends_on:
    - pg
    restart: unless-stopped
    environment:
      ConnectionStrings__PaymentDb: postgres://${DB_USER:-catalog_admin}:${DB_PASSWORD}@pg:5432/${DB_NAME:-catalog}?sslmode=disable
      POSTGRES_DSN: postgres://${DB_USER:-catalog_admin}:${DB_PASSWORD}@pg:5432/${DB_NAME:-catalog}?sslmode=disable
    ports:
    - 7001:7001
    - 7002:8080
  cart.redis:
    image: redis:7-alpine
    container_name: cart-redis
    restart: unless-stopped
    ports:
    - 6379:6379
  cart.api:
    image: ${REGISTRY}:cart.api-${TAG:-dev}
    container_name: cart-api
    depends_on:
    - cart.redis
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Redis: cart.redis:6379
    ports:
    - 5010:80
  inventory.api:
    image: ${REGISTRY}:inventory.api-${TAG:-dev}
    container_name: inventory-api
    depends_on:
    - pg
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgresql://${DB_USER:-catalog_admin}:${DB_PASSWORD}@pg:5432/${DB_NAME:-catalog}?sslmode=disable
    ports:
    - 8210:8000
  analytics.api:
    image: ${REGISTRY}:analytics.api-${TAG:-dev}
    container_name: analytics-api
    depends_on:
    - pg
    restart: unless-stopped
    environment:
      ConnectionStrings__AnalyticsDb: postgresql://${DB_USER:-catalog_admin}:${DB_PASSWORD}@pg:5432/${DB_NAME:-catalog}
    ports:
    - 8100:8000
  auth.api:
    image: ${REGISTRY}:auth.api-${TAG:-dev}
    container_name: auth-api
    depends_on:
    - pg
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AuthDb: Host=pg;Port=5432;Database=${DB_NAME:-catalog};Username=${DB_USER:-catalog_admin};Password=${DB_PASSWORD}
    ports:
    - 7000:8080
  notification.api:
    image: ${REGISTRY}:notification.api-${TAG:-dev}
    container_name: notification-api
    restart: unless-stopped
    environment:
      SMTP_HOST: smtp
      SMTP_PORT: 1025
      SMTP_FROM: no-reply@example.com
    ports:
    - 8200:8000
  promotion.api:
    image: ${REGISTRY}:promotion.api-${TAG:-dev}
    container_name: promotion-api
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    ports:
    - 8400:8000
  review.api:
    image: ${REGISTRY}:review.api-${TAG:-dev}
    container_name: review-api
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    ports:
    - 8500:8000
  wishlist.api:
    image: ${REGISTRY}:wishlist.api-${TAG:-dev}
    container_name: wishlist-api
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    ports:
    - 8700:8000
  experiment.api:
    image: ${REGISTRY}:experiment.api-${TAG:-dev}
    container_name: experiment-api
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    ports:
    - 8800:8000
  cms.api:
    image: ${REGISTRY}:cms.api-${TAG:-dev}
    container_name: cms-api
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    ports:
    - 8900:8000
  rma.api:
    image: ${REGISTRY}:rma.api-${TAG:-dev}
    container_name: rma-api
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    ports:
    - 9000:8000
  tax.api:
    image: ${REGISTRY}:tax.api-${TAG:-dev}
    container_name: tax-api
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    ports:
    - 9010:8000
  currency.api:
    image: ${REGISTRY}:currency.api-${TAG:-dev}
    container_name: currency-api
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    ports:
    - 9020:8000
  address.api:
    image: ${REGISTRY}:address.api-${TAG:-dev}
    container_name: address-api
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    ports:
    - 9030:8000
  consent.api:
    image: ${REGISTRY}:consent.api-${TAG:-dev}
    container_name: consent-api
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    ports:
    - 9070:8000
  bff.api:
    image: ${REGISTRY}:bff.api-${TAG:-dev}
    container_name: bff-api
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    ports:
    - 9080:8000
  tenant.api:
    image: ${REGISTRY}:tenant.api-${TAG:-dev}
    container_name: tenant-api
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    ports:
    - 9100:8000
  admin.api:
    image: ${REGISTRY}:admin.api-${TAG:-dev}
    container_name: admin-api
    depends_on:
    - catalog.api
    - order.api
    - user.api
    - inventory.api
    restart: unless-stopped
    environment:
      CATALOG_URL: http://catalog.api:8080
      ORDER_URL: http://order.api:8080
      USER_URL: http://user.api:80
      INVENTORY_URL: http://inventory.api:8000
    ports:
    - 8300:8000
  gateway:
    image: ${REGISTRY}:kong.gateway-${TAG:-dev}
    container_name: gateway
    depends_on:
    - catalog.api
    - order.api
    - user.api
    - shipping.api
    - payment.api
    - cart.api
    - inventory.api
    - analytics.api
    - auth.api
    - notification.api
    - promotion.api
    - review.api
    - wishlist.api
    - experiment.api
    - cms.api
    - rma.api
    - tax.api
    - currency.api
    - address.api
    - consent.api
    - bff.api
    - tenant.api
    ports:
    - 8000:8000
    - 8001:8001
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_CORS_ORIGIN_PRIMARY: ${KONG_CORS_ORIGIN_PRIMARY:-https://storefront.local}
      KONG_CORS_ORIGIN_SECONDARY: ${KONG_CORS_ORIGIN_SECONDARY:-https://merchant.local}
      KONG_RATE_LIMIT_MINUTE: ${KONG_RATE_LIMIT_MINUTE:-60}
      KONG_REQUEST_BODY_LIMIT_MB: ${KONG_REQUEST_BODY_LIMIT_MB:-2}
      KONG_FRONTEND_JWT_SECRET: ${KONG_FRONTEND_JWT_SECRET:-changeme-frontend}
      KONG_ADMIN_JWT_SECRET: ${KONG_ADMIN_JWT_SECRET:-changeme-admin}
    volumes:
    - ./Gateway/kong.yml:/kong/kong.yml
  frontend:
    image: ${REGISTRY}:frontend.app-${TAG:-dev}
    container_name: frontend
    depends_on:
    - gateway
    ports:
    - 3000:80
    volumes:
    - ../frontend/nginx.conf:/etc/nginx/nginx.conf:ro
  merchant.web:
    image: ${REGISTRY}:merchant.web-${TAG:-dev}
    container_name: merchant-web
    depends_on:
    - gateway
    ports:
    - 3002:80
  storefront.web:
    image: ${REGISTRY}:storefront.web-${TAG:-dev}
    container_name: storefront-web
    depends_on:
    - gateway
    ports:
    - 4000:3000
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
    - gateway
    ports:
    - 9090:9090
  grafana:
    image: grafana/grafana-oss:10.4.2
    container_name: grafana
    depends_on:
    - prometheus
    environment:
    - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
    - 3001:3000
volumes:
  pgdata: null
