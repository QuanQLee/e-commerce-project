openapi: 3.0.0
info:
  title: RMA API
  version: v1
paths:
  /returns/{id}:
    post:
      summary: Create return request
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReturnRequest'
      responses:
        '200':
          description: Created
    get:
      summary: Get return status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
components:
  schemas:
    ReturnRequest:
      type: object
      properties:
        order_id:
          type: string
        reason:
          type: string
      required:
        - order_id
        - reason
