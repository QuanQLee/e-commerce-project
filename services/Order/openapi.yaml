openapi: 3.1.0
info:
  title: Order API
  version: v1
paths:
  /orders:
    get:
      summary: Get all orders
      parameters:
        - in: header
          name: X-Tenant-Id
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Id
          required: false
          schema:
            type: string
            format: uuid
          description: Current-user identity propagated by the BFF.
        - in: query
          name: userId
          required: false
          schema:
            type: string
            format: uuid
          description: Legacy fallback when X-User-Id is not available.
      responses:
        '200':
          description: List of orders
    post:
      summary: Create order
      parameters:
        - in: header
          name: X-Tenant-Id
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Id
          required: false
          schema:
            type: string
            format: uuid
          description: Current-user identity propagated by the BFF.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderDto'
      responses:
        '201':
          description: Created
  /orders/{id}:
    get:
      summary: Get order by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: X-Tenant-Id
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Id
          required: false
          schema:
            type: string
            format: uuid
          description: Current-user identity propagated by the BFF.
      responses:
        '200':
          description: Order
        '404':
          description: Not found
  /orders/{id}/status:
    put:
      summary: Update order status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: X-Tenant-Id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatusDto'
      responses:
        '200':
          description: Updated
components:
  schemas:
    CreateOrderDto:
      type: object
      properties:
        userId:
          type: string
          format: uuid
          description: Legacy fallback when X-User-Id is not available.
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreateOrderItemDto'
        total:
          type: number
      required:
        - items
        - total
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
        userId:
          type: string
          format: uuid
        totalPrice:
          type: number
        status:
          $ref: '#/components/schemas/OrderStatus'
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        tenantId:
          type: string
        productName:
          type: string
        price:
          type: number
          format: decimal
    CreateOrderItemDto:
      type: object
      properties:
        productName:
          type: string
        price:
          type: number
          format: decimal
    UpdateStatusDto:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'
      required:
        - status
    OrderStatus:
      type: integer
      description: Order status enum





