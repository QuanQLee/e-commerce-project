openapi: 3.1.0
info:
  title: Payment API
  version: v1
paths:
  /v1/payment:
    get:
      summary: List payments
      parameters:
        - in: header
          name: X-Tenant-Id
          required: false
          schema: { type: string }
      responses:
        '200':
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PaymentItem' }
    post:
      summary: Create payment
      parameters:
        - in: header
          name: X-Tenant-Id
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePaymentRequest' }
      responses:
        '200':
          description: Payment result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentResponse' }

  /v1/payment/{payment_id}/status:
    post:
      summary: Update payment status
      parameters:
        - in: header
          name: X-Tenant-Id
          required: false
          schema: { type: string }
        - in: path
          name: payment_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdatePaymentStatusRequest' }
      responses:
        '200':
          description: Updated payment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentResponse' }

  /webhooks/payment-callback:
    post:
      summary: Payment callback with signature verification
      parameters:
        - in: header
          name: X-Callback-Timestamp
          required: true
          schema: { type: string }
        - in: header
          name: X-Callback-Signature
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CallbackRequest' }
      responses:
        '200': { description: Accepted }

  /payments/reconcile:
    get:
      summary: Reconcile payment records
      parameters:
        - in: header
          name: X-Tenant-Id
          required: false
          schema: { type: string }
      responses:
        '200': { description: Reconcile result }

  /payments/{id}/refunds:
    post:
      summary: Create refund
      parameters:
        - in: header
          name: X-Tenant-Id
          required: false
          schema: { type: string }
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefundRequest' }
      responses:
        '200': { description: Refund created }
    get:
      summary: List refunds of payment
      parameters:
        - in: header
          name: X-Tenant-Id
          required: false
          schema: { type: string }
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Refund list }

  /ops/channels:
    get:
      summary: View channel health
      responses:
        '200': { description: Channels }

  /ops/channels/{channel}/health:
    put:
      summary: Set channel health
      parameters:
        - in: path
          name: channel
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChannelHealthRequest' }
      responses:
        '200': { description: Updated }

components:
  schemas:
    CreatePaymentRequest:
      type: object
      properties:
        order_id: { type: string }
        amount: { type: number, format: double }

    PaymentResponse:
      type: object
      properties:
        payment_id: { type: string }
        status: { type: string }

    PaymentItem:
      type: object
      properties:
        payment_id: { type: string }
        amount: { type: number, format: double }
        status: { type: string }

    UpdatePaymentStatusRequest:
      type: object
      properties:
        payment_id: { type: string }
        status: { type: string }

    CallbackRequest:
      type: object
      properties:
        payment_id: { type: integer }
        status: { type: string }
        paid_amount: { type: number }
        gateway_reference: { type: string }
        event_type: { type: string }

    RefundRequest:
      type: object
      properties:
        amount: { type: number }
        reason: { type: string }

    ChannelHealthRequest:
      type: object
      properties:
        healthy: { type: boolean }
