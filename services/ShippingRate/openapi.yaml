openapi: 3.0.0
info:
  title: Shipping Rate API
  version: v1
paths:
  /rates:
    post:
      summary: Get shipping rate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                weight:
                  type: number
      responses:
        '200':
          description: OK
components: {}
