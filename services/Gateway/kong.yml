_format_version: '3.0'
_transform: true
consumers:
- username: frontend
  jwt_secrets:
  - key: frontend
    secret: '__KONG_FRONTEND_JWT_SECRET__'
    algorithm: HS256
  acls:
  - group: frontend-group
- username: admin
  jwt_secrets:
  - key: admin
    secret: '__KONG_ADMIN_JWT_SECRET__'
    algorithm: HS256
  acls:
  - group: admin-group
services:
- name: bff-public
  url: http://bff.api:8000
  connect_timeout: 2000
  write_timeout: 30000
  read_timeout: 30000
  retries: 2
  routes:
  - name: bff-auth
    paths:
    - /auth
    strip_path: false
    plugins:
    - name: rate-limiting
      config:
        minute: __KONG_AUTH_RATE_LIMIT_MINUTE__
        policy: local
  - name: bff-api
    paths:
    - /api/v1
    strip_path: false
  - name: bff-aggregate
    paths:
    - /aggregate
    strip_path: false
  - name: bff-health
    paths:
    - /healthz
    - /readyz
    strip_path: false
- name: bff-status
  url: http://bff.api:8000/healthz
  connect_timeout: 1000
  write_timeout: 3000
  read_timeout: 3000
  retries: 1
  routes:
  - name: status
    paths:
    - /status
    strip_path: true
- name: auth-public
  url: http://auth.api:8080
  connect_timeout: 2000
  write_timeout: 30000
  read_timeout: 30000
  retries: 2
  routes:
  - name: auth-oidc
    preserve_host: true
    paths:
    - /.well-known
    - /connect
    - /account
    - /Account
    - /home
    - /Home
    strip_path: false
plugins:
- name: cors
  config:
    origins:
    - '__KONG_CORS_ORIGIN_PRIMARY__'
    - '__KONG_CORS_ORIGIN_SECONDARY__'
    methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
    headers:
    - Authorization
    - Content-Type
    - X-Requested-With
    - Accept
    - Accept-Language
    - X-Tenant-Id
    - apikey
    exposed_headers:
    - X-Request-Id
    credentials: true
    max_age: 3600
- name: rate-limiting
  config:
    minute: __KONG_RATE_LIMIT_MINUTE__
    policy: local
    fault_tolerant: true
- name: request-size-limiting
  config:
    allowed_payload_size: __KONG_REQUEST_BODY_LIMIT_MB__
    size_unit: megabytes
- name: correlation-id
  config:
    header_name: X-Request-Id
    generator: uuid
    echo_downstream: true
- name: response-transformer
  config:
    remove:
      headers:
      - Server
      - Via
      - X-Kong-Upstream-Latency
      - X-Kong-Proxy-Latency
- name: prometheus
