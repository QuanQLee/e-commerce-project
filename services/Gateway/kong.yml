---
_format_version: '3.0'
_transform: true
consumers:
  - username: frontend
    jwt_secrets:
      - key: frontend
        secret: myfrontendsecret
        algorithm: HS256
    acls:
      - group: frontend-group
  - username: admin
    jwt_secrets:
      - key: admin
        secret: myadminsecret
        algorithm: HS256
    acls:
      - group: admin-group

services:
  - name: catalog
    protocol: http
    host: catalog.api
    port: 80
    routes:
      - name: catalog
        paths:
          - /api/v1/catalog
        strip_path: true

  - name: order
    protocol: http
    host: order.api
    port: 80
    routes:
      - name: order
        paths:
          - /api/v1/order
        strip_path: true

  - name: user
    protocol: http
    host: user.api
    port: 80
    routes:
      - name: user
        paths:
          - /api/v1/user
        strip_path: true

  - name: shipping
    protocol: http
    host: shipping.api
    port: 80
    routes:
      - name: shipping
        paths:
          - /api/v1/shipping
        strip_path: true

  - name: payment
    protocol: http
    host: payment.api
    port: 8080
    routes:
      - name: payment
        paths:
          - /api/v1/payment
        strip_path: true

  - name: analytics
    protocol: http
    host: analytics.api
    port: 8000
    routes:
      - name: analytics
        paths:
          - /api/v1/analytics
        strip_path: true

  - name: inventory
    protocol: http
    host: inventory.api
    port: 8000
    routes:
      - name: inventory
        paths:
          - /api/v1/inventory
        strip_path: true

  - name: promotion
    protocol: http
    host: promotion.api
    port: 8000
    routes:
      - name: promotion
        paths:
          - /api/v1/promotion
        strip_path: true

  - name: review
    protocol: http
    host: review.api
    port: 8000
    routes:
      - name: review
        paths:
          - /api/v1/review
        strip_path: true

  - name: recommendation
    protocol: http
    host: recommendation.api
    port: 8000
    routes:
      - name: recommendation
        paths:
          - /api/v1/recommendation
        strip_path: true

  - name: wishlist
    protocol: http
    host: wishlist.api
    port: 8000
    routes:
      - name: wishlist
        paths:
          - /api/v1/wishlist
        strip_path: true

  - name: experiment
    protocol: http
    host: experiment.api
    port: 8000
    routes:
      - name: experiment
        paths:
          - /api/v1/experiment
        strip_path: true

  - name: cms
    protocol: http
    host: cms.api
    port: 8000
    routes:
      - name: cms
        paths:
          - /api/v1/cms
        strip_path: true
  - name: rma
    protocol: http
    host: rma.api
    port: 8000
    routes:
      - name: rma
        paths:
          - /api/v1/rma
        strip_path: true

  - name: tax
    protocol: http
    host: tax.api
    port: 8000
    routes:
      - name: tax
        paths:
          - /api/v1/tax
        strip_path: true

  - name: currency
    protocol: http
    host: currency.api
    port: 8000
    routes:
      - name: currency
        paths:
          - /api/v1/currency
        strip_path: true

  - name: address
    protocol: http
    host: address.api
    port: 8000
    routes:
      - name: address
        paths:
          - /api/v1/address
        strip_path: true

  - name: shippingrate
    protocol: http
    host: shippingrate.api
    port: 8000
    routes:
      - name: shippingrate
        paths:
          - /api/v1/shippingrate
        strip_path: true

  - name: auth
    protocol: http
    host: auth.api
    port: 80
    routes:
      - name: auth
        paths:
          - /api/v1/auth
        strip_path: true
    # Allow token endpoints to be accessed without gateway auth
    # (otherwise login cannot obtain a JWT).
    plugins:
      - name: jwt
        enabled: false
      - name: acl
        enabled: false
        config:
          allow:
            - frontend-group
            - admin-group

  - name: security
    protocol: http
    host: security.api
    port: 8082
    routes:
      - name: security
        paths:
          - /api/v1/security
        strip_path: true
  - name: admin
    protocol: http
    host: admin.api
    port: 8000
    routes:
      - name: admin
        paths:
          - /api/v1/admin
        strip_path: true
    plugins:
      - name: acl
        config:
          allow:
            - admin-group

plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      headers: ["*"]
      exposed_headers: ["*"]
      credentials: true
  - name: jwt
  - name: acl
    config:
      allow:
        - frontend-group
        - admin-group
  - name: rate-limiting
    config:
      minute: 60
      policy: local
  - name: prometheus
