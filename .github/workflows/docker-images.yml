name: Build Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'services/**/Dockerfile'
      - 'frontend/Dockerfile'
      - '.github/workflows/docker-images.yml'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          services=$(find services -mindepth 1 -maxdepth 1 -type f -name Dockerfile \
            | sed -e 's#services/##' -e 's#/Dockerfile##')
          arr=$(printf '%s\n' $services Frontend | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix={\"service\":$arr}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ matrix.service }}" = "Frontend" ]; then
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              -t ghcr.io/$owner/frontend.app:latest \
              --push \
              -f frontend/Dockerfile frontend
          else
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              -t ghcr.io/$owner/${{ matrix.service }}.api:latest \
              --push \
              -f services/${{ matrix.service }}/Dockerfile services/${{ matrix.service }}
          fi
