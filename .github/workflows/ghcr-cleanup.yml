name: Cleanup old GHCR images

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      keep:
        description: "How many most-recent versions to keep"
        required: false
        default: "4"
      owner:
        description: "Account (user/org) that owns the packages"
        required: false
        default: "${{ github.repository_owner }}"

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Determine scope and set vars
        id: vars
        env:
          INPUT_KEEP: ${{ github.event.inputs.keep }}
          INPUT_OWNER: ${{ github.event.inputs.owner }}
        run: |
          set -euo pipefail
          KEEP=${INPUT_KEEP:-4}
          OWNER=${INPUT_OWNER:-${{ github.repository_owner }}}
          echo "KEEP=$KEEP" >> $GITHUB_ENV
          echo "OWNER=$OWNER" >> $GITHUB_ENV
          # Probe whether OWNER is a user or an org for the Packages API
          if curl -s -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" \
               https://api.github.com/users/$OWNER >/dev/null; then
            echo "SCOPE=users" >> $GITHUB_ENV
          else
            echo "SCOPE=orgs" >> $GITHUB_ENV
          fi

      - name: List container packages under owner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api -H "Accept: application/vnd.github+json" \
            "/${SCOPE}/${OWNER}/packages?package_type=container&per_page=100" \
            | jq -r '.[].name' > packages.txt
          echo "Found packages:" && cat packages.txt || true

      - name: Delete old versions for each package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          KEEP=${KEEP}
          while read -r PKG || [[ -n "$PKG" ]]; do
            [ -z "$PKG" ] && continue
            echo "Processing $PKG (keep $KEEP most recent)"
            # Query versions (newest first), exclude protected tags
            gh api -H "Accept: application/vnd.github+json" \
              "/${SCOPE}/${OWNER}/packages/container/${PKG}/versions?per_page=100" \
              | jq -r --argjson keep "$KEEP" '
                  # Exclude versions that contain protected tags
                  def protected: ["latest","prod","stable"]; 
                  map(select(((.metadata.container.tags // []) | any(. as $t | protected | index($t))) | not))
                  | sort_by(.created_at) | reverse | .[$keep:] | .[].id
                ' > delete_ids.txt || true

            if [ -s delete_ids.txt ]; then
              echo "Deleting versions: $(cat delete_ids.txt | paste -sd, -)"
              while read -r VID || [[ -n "$VID" ]]; do
                gh api -X DELETE \
                  "/${SCOPE}/${OWNER}/packages/container/${PKG}/versions/${VID}" || true
              done < delete_ids.txt
            else
              echo "Nothing to delete for $PKG"
            fi
          done < packages.txt

      - name: Done
        run: echo "Cleanup finished."

    # Notes:
    # - GITHUB_TOKEN usually suffices for packages published by this repo. If you
    #   see 403 errors, create a PAT with 'delete:packages' and 'read:packages'
    #   scopes, store it as GHCR_TOKEN, and replace GH_TOKEN usages above with it.

