name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - 'README.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:9080
      NEXT_PUBLIC_API_KEY: ''
      VITE_API_BASE_URL: http://localhost:9080
      VITE_API_KEY: ''
      ASPNETCORE_ENVIRONMENT: Development
      KONG_CORS_ORIGIN_PRIMARY: https://storefront.local
      KONG_CORS_ORIGIN_SECONDARY: https://merchant.local
      KONG_RATE_LIMIT_MINUTE: "60"
      KONG_REQUEST_BODY_LIMIT_MB: "2"
      KONG_FRONTEND_JWT_SECRET: ci-frontend-secret
      KONG_ADMIN_JWT_SECRET: ci-admin-secret
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: |
          pip install --user poetry
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            apps/merchant/package-lock.json
            apps/storefront/package-lock.json

      - name: Ensure latest npm
        run: npm i -g npm@latest

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps
          npm test --silent

      - name: Build storefront (Next.js)
        working-directory: apps/storefront
        run: |
          rm -rf .next node_modules || true
          npm install --no-audit --no-fund --legacy-peer-deps
          npm run build --silent

      - name: Build merchant (Vite)
        working-directory: apps/merchant
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps
          npm run build --silent

      - name: Run Python tests
        run: |
          for service in Admin Analytics Inventory; do
            cd services/$service
            # Ensure lock file is synced with pyproject (handles dependency tweaks in PRs)
            poetry lock -n
            poetry install -n
            poetry run pytest -q
            cd ../../
          done

      - name: Run .NET tests
        run: |
          for proj in services/*/*.Tests/*.csproj; do
            echo "Testing $proj"
            dotnet test --collect:"XPlat Code Coverage" "$proj"
          done

      - name: Setup decK
        uses: kong/setup-deck@v1
      - name: Render Kong config
        run: |
          python scripts/render-kong-config.py \
            services/Gateway/kong.yml \
            services/Gateway/kong.rendered.yml
      - name: Start Kong Gateway
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --name kong-test \
            -p 8000:8000 -p 8443:8443 -p 8001:8001 \
            -e KONG_DATABASE=off \
            -e KONG_DECLARATIVE_CONFIG=/kong/kong.yml \
            -e KONG_ADMIN_LISTEN=0.0.0.0:8001 \
            -e KONG_LOG_LEVEL=info \
            -v ${{ github.workspace }}/services/Gateway/kong.rendered.yml:/kong/kong.yml \
            kong:3

          echo "Waiting for Kong admin API to be ready..."
          ready=false
          for i in {1..24}; do
            if curl -fsS http://127.0.0.1:8001/status > /dev/null; then
              echo "Kong is ready."
              ready=true
              break
            fi
            sleep 5
          done

          if [ "$ready" != true ]; then
            echo "Kong did not become ready within timeout. Showing logs:"
            docker logs --tail 200 kong-test || true
            docker ps -a || true
            exit 1
          fi
      - name: Sync Kong config
        # Use decK classic syntax for Kong Gateway to avoid version-specific flags
        run: deck sync -s services/Gateway/kong.rendered.yml --kong-addr http://127.0.0.1:8001
      - name: Stop Kong Gateway
        run: docker rm -f kong-test

  push-ecr:
    needs: build
    if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/master') || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: 323155025209.dkr.ecr.us-west-1.amazonaws.com
      ECR_REPOSITORY: e-commercial
      ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
      ECS_SERVICES: ${{ secrets.ECS_SERVICES }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Prepare compose variables
        shell: bash
        run: |
          echo "REGISTRY=${ECR_REGISTRY}/${ECR_REPOSITORY}" >> $GITHUB_ENV
          ghcr_registry=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          echo "GHCR_REGISTRY=$ghcr_registry" >> $GITHUB_ENV
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/heads/master ]]; then
            echo "TAG=latest" >> $GITHUB_ENV
          else
            echo "TAG=dev" >> $GITHUB_ENV
          fi
      - name: Build images for ECR
        run: docker compose -f services/docker-compose.yml build
      - name: Push images to ECR
        run: docker compose -f services/docker-compose.yml push
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build images for GHCR
        run: REGISTRY=${GHCR_REGISTRY} TAG=${TAG} docker compose -f services/docker-compose.yml build
      - name: Push images to GHCR
        run: REGISTRY=${GHCR_REGISTRY} TAG=${TAG} docker compose -f services/docker-compose.yml push
      - name: Trigger ECS deployment
        if: env.ECS_CLUSTER != '' && env.ECS_SERVICES != ''
        shell: bash
        run: |
          IFS=',' read -ra services <<< "${ECS_SERVICES}"
          for svc in "${services[@]}"; do
            svc_trimmed="$(echo "$svc" | xargs)"
            if [[ -n "$svc_trimmed" ]]; then
              echo "Deploying service: $svc_trimmed"
              aws ecs update-service \
                --cluster "${ECS_CLUSTER}" \
                --service "$svc_trimmed" \
                --force-new-deployment
            fi
          done

  deploy-ec2:
    needs: push-ecr
    if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/master') || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      GHCR_REGISTRY: ghcr.io/${{ github.repository_owner }}
      REMOTE_PATH: ${{ secrets.EC2_REMOTE_PATH }}
      COMPOSE_FILES: ${{ secrets.EC2_COMPOSE_FILES }}
      ENV_B64: ${{ secrets.EC2_ENV_B64 }}
    steps:
      - name: Resolve deployment tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/heads/master ]]; then
            echo "TAG=latest" >> $GITHUB_ENV
          else
            echo "TAG=dev" >> $GITHUB_ENV
          fi
      - name: Prepare remote path
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            REMOTE_PATH="${REMOTE_PATH:-/home/${{ secrets.EC2_USER }}/ecommerce/current}"
            mkdir -p "${REMOTE_PATH}"
      - name: Upload compose files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "services/docker-compose.yml,services/docker-compose.aws.yml,services/docker-compose.aws.logging.yml"
          target: "${{ secrets.EC2_REMOTE_PATH }}"
      - name: Upload .env from secret
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            REMOTE_PATH="${REMOTE_PATH:-/home/${{ secrets.EC2_USER }}/ecommerce/current}"
            if [ -n "${ENV_B64}" ]; then
              echo "${ENV_B64}" | base64 -d > "${REMOTE_PATH}/.env"
            fi
      - name: Deploy to EC2 via SSH (GHCR)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            REGISTRY="${GHCR_REGISTRY}"
            TAG="${TAG}"
            REMOTE_PATH="${REMOTE_PATH:-/home/${{ secrets.EC2_USER }}/ecommerce/current}"
            COMPOSE_FILES="${COMPOSE_FILES:-docker-compose.yml}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            cd "${REMOTE_PATH}"
            REGISTRY="${REGISTRY}" TAG="${TAG}" docker compose ${COMPOSE_FILES} pull
            REGISTRY="${REGISTRY}" TAG="${TAG}" docker compose ${COMPOSE_FILES} up -d --remove-orphans
            docker compose ${COMPOSE_FILES} ps
