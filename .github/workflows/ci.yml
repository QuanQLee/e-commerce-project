name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - 'README.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: |
          pip install --user poetry
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            apps/merchant/package-lock.json
            apps/storefront/package-lock.json

      - name: Ensure latest npm
        run: npm i -g npm@latest

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps
          npm test --silent

      - name: Build storefront (Next.js)
        working-directory: apps/storefront
        run: |
          rm -rf .next node_modules || true
          npm install --no-audit --no-fund --legacy-peer-deps
          npm run build --silent

      - name: Build merchant (Vite)
        working-directory: apps/merchant
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps
          npm run build --silent

      - name: Run Python tests
        run: |
          for service in Admin Analytics Inventory; do
            cd services/$service
            poetry install -n
            poetry run pytest -q
            cd ../../
          done

      - name: Run .NET tests
        run: |
          for proj in services/*/*.Tests/*.csproj; do
            echo "Testing $proj"
            dotnet test --collect:"XPlat Code Coverage" "$proj"
          done

      - name: Setup decK
        uses: kong/setup-deck@v1
      - name: Start Kong Gateway
        shell: bash
        run: |
          docker run -d --name kong-test \
            -p 8001:8001 \
            -e KONG_DATABASE=off \
            -e KONG_DECLARATIVE_CONFIG=/kong/kong.yml \
            -e KONG_ADMIN_LISTEN=0.0.0.0:8001 \
            -v ${{ github.workspace }}/services/Gateway/kong.yml:/kong/kong.yml \
            kong:3
          for i in {1..10}; do
            if curl -s http://localhost:8001/status > /dev/null; then
              break
            fi
            sleep 5
          done
      - name: Sync Kong config
        run: deck sync --state services/Gateway/kong.yml --kong-addr http://127.0.0.1:8001
      - name: Stop Kong Gateway
        run: docker rm -f kong-test
      - name: Set lowercase registry
        run: echo "REGISTRY=$(echo ghcr.io/${{ github.repository_owner }}/ | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set image tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/heads/master ]]; then
            echo "TAG=latest" >> $GITHUB_ENV
          else
            echo "TAG=dev" >> $GITHUB_ENV
          fi

      - name: Build images
        run: docker compose -f services/docker-compose.yml build
        env:
          REGISTRY: ${{ env.REGISTRY }}
          TAG: ${{ env.TAG }}
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push images
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/master') || startsWith(github.ref, 'refs/tags/v')
        run: docker compose -f services/docker-compose.yml push
        env:
          REGISTRY: ${{ env.REGISTRY }}
          TAG: ${{ env.TAG }}


