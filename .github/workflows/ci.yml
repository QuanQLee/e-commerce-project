name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - 'README.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:9080
      NEXT_PUBLIC_API_KEY: ''
      VITE_API_BASE_URL: http://localhost:9080
      VITE_API_KEY: ''
      ASPNETCORE_ENVIRONMENT: Development
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: |
          pip install --user poetry
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            apps/merchant/package-lock.json
            apps/storefront/package-lock.json

      - name: Ensure latest npm
        run: npm i -g npm@latest

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps
          npm test --silent

      - name: Build storefront (Next.js)
        working-directory: apps/storefront
        run: |
          rm -rf .next node_modules || true
          npm install --no-audit --no-fund --legacy-peer-deps
          npm run build --silent

      - name: Build merchant (Vite)
        working-directory: apps/merchant
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps
          npm run build --silent

      - name: Run Python tests
        run: |
          for service in Admin Analytics Inventory; do
            cd services/$service
            # Ensure lock file is synced with pyproject (handles dependency tweaks in PRs)
            poetry lock -n
            poetry install -n
            poetry run pytest -q
            cd ../../
          done

      - name: Run .NET tests
        run: |
          for proj in services/*/*.Tests/*.csproj; do
            echo "Testing $proj"
            dotnet test --collect:"XPlat Code Coverage" "$proj"
          done

      - name: Setup decK
        uses: kong/setup-deck@v1
      - name: Start Kong Gateway
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --name kong-test \
            -p 8000:8000 -p 8443:8443 -p 8001:8001 \
            -e KONG_DATABASE=off \
            -e KONG_DECLARATIVE_CONFIG=/kong/kong.yml \
            -e KONG_ADMIN_LISTEN=0.0.0.0:8001 \
            -e KONG_LOG_LEVEL=info \
            -v ${{ github.workspace }}/services/Gateway/kong.yml:/kong/kong.yml \
            kong:3

          echo "Waiting for Kong admin API to be ready..."
          ready=false
          for i in {1..24}; do
            if curl -fsS http://127.0.0.1:8001/status > /dev/null; then
              echo "Kong is ready."
              ready=true
              break
            fi
            sleep 5
          done

          if [ "$ready" != true ]; then
            echo "Kong did not become ready within timeout. Showing logs:"
            docker logs --tail 200 kong-test || true
            docker ps -a || true
            exit 1
          fi
      - name: Sync Kong config
        # Use decK classic syntax for Kong Gateway to avoid version-specific flags
        run: deck sync -s services/Gateway/kong.yml --kong-addr http://127.0.0.1:8001
      - name: Stop Kong Gateway
        run: docker rm -f kong-test

  push-ecr:
    needs: build
    if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/master') || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: 323155025209.dkr.ecr.us-west-1.amazonaws.com
      ECR_REPOSITORY: e-commercial
      ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
      ECS_SERVICES: ${{ secrets.ECS_SERVICES }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Prepare compose variables
        shell: bash
        run: |
          echo "REGISTRY=${ECR_REGISTRY}/${ECR_REPOSITORY}" >> $GITHUB_ENV
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/heads/master ]]; then
            echo "TAG=latest" >> $GITHUB_ENV
          else
            echo "TAG=dev" >> $GITHUB_ENV
          fi
      - name: Build images for ECR
        run: docker compose -f services/docker-compose.yml build
      - name: Push images to ECR
        run: docker compose -f services/docker-compose.yml push
      - name: Trigger ECS deployment
        if: env.ECS_CLUSTER != '' && env.ECS_SERVICES != ''
        shell: bash
        run: |
          IFS=',' read -ra services <<< "${ECS_SERVICES}"
          for svc in "${services[@]}"; do
            svc_trimmed="$(echo "$svc" | xargs)"
            if [[ -n "$svc_trimmed" ]]; then
              echo "Deploying service: $svc_trimmed"
              aws ecs update-service \
                --cluster "${ECS_CLUSTER}" \
                --service "$svc_trimmed" \
                --force-new-deployment
            fi
          done


